<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>今日午餐命運機</title>
    <style>
*, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: #07011a;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
}
body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background:
        radial-gradient(ellipse 70% 50% at 50% -5%,  rgba(110,50,220,.4) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 10% 90%,  rgba(60,30,180,.25) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 90% 85%,  rgba(160,30,180,.2) 0%, transparent 60%);
}
.app {
    position: relative; z-index: 1;
    width: 100%; max-width: 390px;
    padding: 0 20px;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
}

/* Header */
.title {
    font-size: 24px; font-weight: 900; color: #f5c842; letter-spacing: 3px;
    text-shadow: 0 0 24px rgba(245,200,66,.65), 0 0 48px rgba(245,200,66,.3);
    text-align: center;
}
.subtitle { font-size: 11px; color: rgba(255,255,255,.35); text-align: center; margin-top: 5px; letter-spacing: 1px; }

/* Mood */
.mood-q { font-size: 12px; color: rgba(255,255,255,.45); text-align: center; margin-bottom: 10px; letter-spacing: .5px; }
.mood-row { display: flex; gap: 8px; width: 100%; }
.mood-btn {
    flex: 1;
    background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.1);
    border-radius: 14px; padding: 10px 2px 8px;
    color: #fff; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: all .2s;
}
.mood-btn .e { font-size: 21px; }
.mood-btn .t { font-size: 10px; color: rgba(255,255,255,.4); white-space: nowrap; }
.mood-btn.on { background: rgba(110,45,210,.35); border-color: #f5c842; box-shadow: 0 0 16px rgba(245,200,66,.2); }
.mood-btn.on .t { color: rgba(255,255,255,.75); }

/* Mood hint */
.mood-hint {
    font-size: 11px; color: rgba(245,200,66,.55);
    text-align: center; height: 16px; margin-top: 6px;
    transition: opacity .3s; opacity: 0;
    letter-spacing: .5px;
}
.mood-hint.show { opacity: 1; }

/* Divider */
.divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(245,200,66,.2), transparent); }

/* Slots */
.slots { width: 100%; display: flex; gap: 12px; }
.slot { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.slot-lbl { font-size: 12px; color: rgba(255,255,255,.45); letter-spacing: 1px; }
.slot-win {
    width: 100%; height: 144px; position: relative; overflow: hidden;
    border-radius: 16px; background: #030010;
    border: 2px solid rgba(245,200,66,.5);
    box-shadow: 0 0 0 1px rgba(245,200,66,.08), 0 0 32px rgba(245,200,66,.08), inset 0 0 28px rgba(0,0,0,.85);
}
.slot-win::before, .slot-win::after {
    content: ''; position: absolute; left: 0; right: 0; z-index: 3; pointer-events: none;
}
.slot-win::before { top: 0; height: 42%; background: linear-gradient(180deg, #030010 0%, rgba(3,0,16,0) 100%); }
.slot-win::after  { bottom: 0; height: 42%; background: linear-gradient(0deg, #030010 0%, rgba(3,0,16,0) 100%); }
.slot-hl {
    position: absolute; top: 50%; left: 10px; right: 10px;
    transform: translateY(-50%); height: 48px;
    border-top: 1px solid rgba(245,200,66,.22); border-bottom: 1px solid rgba(245,200,66,.22);
    z-index: 2; pointer-events: none;
}
.slot-idle {
    position: absolute; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: rgba(255,255,255,.08); font-weight: 900;
}
.slot-idle.hidden { display: none; }
.slot-strip { position: absolute; width: 100%; top: 0; will-change: transform; }
.slot-item {
    height: 48px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: rgba(255,255,255,.4);
    text-align: center; padding: 0 6px; line-height: 1.25;
}
.slot-item.winner { color: #f5c842; font-size: 15px; text-shadow: 0 0 14px rgba(245,200,66,.8); }

/* Category tag under slot */
.cat-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: rgba(245,200,66,.7);
    background: rgba(245,200,66,.1); border: 1px solid rgba(245,200,66,.25);
    border-radius: 20px; padding: 2px 10px;
    opacity: 0; transition: opacity .5s;
    height: 20px;
}
.cat-tag.show { opacity: 1; }

/* Spin button */
.spin-btn {
    width: 100%; max-width: 260px; height: 56px;
    background: linear-gradient(135deg, #5a28a0 0%, #8830e0 100%);
    border: 2px solid rgba(245,200,66,.6); border-radius: 28px;
    color: #ffe680; font-size: 17px; font-weight: 800; letter-spacing: 2px;
    cursor: pointer; box-shadow: 0 4px 24px rgba(100,40,160,.55);
    transition: transform .14s, box-shadow .14s;
    position: relative; overflow: hidden;
}
.spin-btn::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,.12) 0%, transparent 100%);
    border-radius: 28px 28px 0 0; pointer-events: none;
}
.spin-btn:active { transform: scale(.94); }
.spin-btn:disabled { opacity: .35; cursor: default; transform: none !important; }

/* Result msg */
.result-msg {
    font-size: 13px; color: rgba(255,255,255,.45); text-align: center;
    height: 18px; opacity: 0; transition: opacity .5s;
}
.result-msg.show { opacity: 1; }

/* Particles */
.p { position: fixed; border-radius: 50%; pointer-events: none; animation: pfade var(--d,1s) ease-out var(--dl,0s) forwards; }
@keyframes pfade {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--x),var(--y)) scale(.1); }
}
    </style>
</head>
<body>
<div class="app">

    <div>
        <div class="title">🎰 今日午餐命運機</div>
        <div class="subtitle">交給命運，讓它幫你決定</div>
    </div>

    <div style="width:100%">
        <div class="mood-q">此刻的你是？（可不選）</div>
        <div class="mood-row">
            <button class="mood-btn" onclick="pickMood(this,'sleepy')">
                <span class="e">😴</span><span class="t">昏昏欲睡</span>
            </button>
            <button class="mood-btn" onclick="pickMood(this,'stressed')">
                <span class="e">😤</span><span class="t">壓力山大</span>
            </button>
            <button class="mood-btn" onclick="pickMood(this,'happy')">
                <span class="e">😊</span><span class="t">心情不錯</span>
            </button>
            <button class="mood-btn" onclick="pickMood(this,'fired')">
                <span class="e">🔥</span><span class="t">充滿活力</span>
            </button>
        </div>
        <div class="mood-hint" id="moodHint"></div>
    </div>

    <div class="divider"></div>

    <div class="slots">
        <div class="slot">
            <div class="slot-lbl">🍱 今日午餐</div>
            <div class="slot-win">
                <div class="slot-hl"></div>
                <div class="slot-idle" id="lunchIdle">？</div>
                <div class="slot-strip" id="lunchStrip"></div>
            </div>
            <div class="cat-tag" id="lunchCat"></div>
        </div>
        <div class="slot">
            <div class="slot-lbl">🧋 手搖飲</div>
            <div class="slot-win">
                <div class="slot-hl"></div>
                <div class="slot-idle" id="drinkIdle">？</div>
                <div class="slot-strip" id="drinkStrip"></div>
            </div>
            <div class="cat-tag" id="drinkCat" style="visibility:hidden"></div>
        </div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">✨ 決定命運 ✨</button>
    <div class="result-msg" id="resultMsg"></div>

</div>
<script>
// ══════════════════════════════════════════════════
//  餐點資料（含分類）
// ══════════════════════════════════════════════════
const LUNCH_DATA = [
    { name: '廣源自助餐',         cat: '飯類' },
    { name: '廣源隔壁的健康餐',   cat: '飯類' },
    { name: '雞魯飯',             cat: '飯類' },
    { name: '燒臘便當',           cat: '飯類' },
    { name: '勇伯雞肉飯',         cat: '飯類' },
    { name: '羊肉便當',           cat: '飯類' },
    { name: '芝生食堂',           cat: '飯類' },
    { name: '給力盒子',           cat: '飯類' },
    { name: '福園便當店',         cat: '飯類' },
    { name: '五畝禾便當',         cat: '飯類' },
    { name: '飯糰＋鍋燒麵',       cat: '麵類' },
    { name: '牛肉麵/榨菜肉絲麵', cat: '麵類' },
    { name: '咖啡廳義式燉飯',     cat: '麵類' },
    { name: '陳家涼麵',           cat: '麵類' },
    { name: '弘得素食',           cat: '麵類' },
    { name: '五草車',             cat: '麵類' },
    { name: '阿妹麵店',           cat: '麵類' },
    { name: '地中海餐廳',         cat: '麵類' },
    { name: '蘇杭點心店',         cat: '麵類' },
    { name: '溫州大餛飩',         cat: '麵類' },
    { name: '蒸肉圓＋四神湯',     cat: '小吃' },
    { name: '鍋貼河粉米線',       cat: '小吃' },
    { name: '廣東粥',             cat: '小吃' },
    { name: '飯捲',               cat: '小吃' },
    { name: '烤地瓜',             cat: '小吃' },
    { name: '市場油飯',           cat: '小吃' },
    { name: '刈包',               cat: '小吃' },
    { name: '麥當當',             cat: '小吃' },
    { name: '爭鮮街邊店',         cat: '小吃' },
    { name: '功夫肉圓',           cat: '小吃' },
    { name: '蔥抓餅',             cat: '小吃' },
    { name: '摩斯漢堡',           cat: '小吃' },
    { name: '同安街麵線羹',       cat: '小吃' },
];

// ══════════════════════════════════════════════════
//  手搖飲（待補充正式品牌）
// ══════════════════════════════════════════════════
const DRINKS = [
    '伍桐號', '麻古茶坊', '先喝道', '得正',
    '初韻', '沐慕', 'Combuy', '自然湉',
    '蓋斯茶', '天仁茗茶', '一手私藏',
];

// ══════════════════════════════════════════════════
//  心情 → 種類機率權重 [飯類, 麵類, 小吃]
// ══════════════════════════════════════════════════
const WEIGHTS = {
    sleepy:   { 飯類: 65, 麵類: 20, 小吃: 15 },  // 昏沉 → 吃飽才有力氣
    stressed: { 飯類: 25, 麵類: 25, 小吃: 50 },  // 壓力 → 快速療癒系
    happy:    { 飯類: 33, 麵類: 34, 小吃: 33 },  // 開心 → 完全隨緣
    fired:    { 飯類: 25, 麵類: 55, 小吃: 20 },  // 活力 → 麵食衝勁
};
const DEFAULT_W = { 飯類: 33, 麵類: 34, 小吃: 33 };

const MOOD_HINTS = {
    sleepy:   '命運偏向飽足路線 🍚',
    stressed: '命運偏向療癒快食 🥡',
    happy:    '完全隨緣，看命運的 🎲',
    fired:    '命運偏向麵食衝勁 🍜',
};

const MSGS = [
    '今天的你，值得吃一頓好的 🌟',
    '吃飽了才有力氣繼續衝，加油 💪',
    '好好享用，午餐是下午能量的來源 ✨',
    '認真工作的你，值得被好好犒賞 🥰',
    '美好的午餐，帶來美好的下午 ☀️',
    '吃好喝好，今天一定順順的 🎶',
    '慢慢吃，這一小時是你的 😌',
    '好的午餐，是好好撐過今天的開始 🍀',
];

const CATS = ['飯類', '麵類', '小吃'];
const IH = 48;
const WH = 144;
const LUNCH_NAMES = LUNCH_DATA.map(d => d.name);

let mood = null;
let busy = false;

function pickMood(btn, m) {
    if (busy) return;
    const was = btn.classList.contains('on');
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('on'));
    const hint = document.getElementById('moodHint');
    if (!was) {
        btn.classList.add('on');
        mood = m;
        hint.textContent = MOOD_HINTS[m];
        hint.classList.add('show');
    } else {
        mood = null;
        hint.classList.remove('show');
    }
}

function weightedPickCat() {
    const w = mood ? WEIGHTS[mood] : DEFAULT_W;
    const total = CATS.reduce((s, c) => s + w[c], 0);
    let r = Math.random() * total;
    for (const c of CATS) { r -= w[c]; if (r <= 0) return c; }
    return CATS[CATS.length - 1];
}

function selectLunch() {
    const cat = weightedPickCat();
    const pool = LUNCH_DATA.map((d, i) => ({ ...d, i })).filter(d => d.cat === cat);
    const pick = pool[Math.floor(Math.random() * pool.length)];
    return pick;
}

function spinSlot(stripId, items, finalIdx, dur, cb) {
    const strip = document.getElementById(stripId);
    const LOOPS = 4;
    const total = LOOPS * items.length + finalIdx + 1;

    let html = '';
    for (let i = 0; i < total; i++) {
        const last = i === total - 1;
        html += `<div class="slot-item${last ? ' winner' : ''}">${items[i % items.length]}</div>`;
    }
    strip.innerHTML = html;

    const startY = WH / 2 - IH / 2;
    const endY   = WH / 2 - IH / 2 - (total - 1) * IH;

    strip.style.transition = 'none';
    strip.style.transform  = `translateY(${startY}px)`;

    requestAnimationFrame(() => requestAnimationFrame(() => {
        strip.style.transition = `transform ${dur}ms cubic-bezier(0, 0, 0.22, 1)`;
        strip.style.transform  = `translateY(${endY}px)`;
    }));

    setTimeout(cb, dur);
}

function spin() {
    if (busy) return;
    busy = true;

    const btn = document.getElementById('spinBtn');
    const msg = document.getElementById('resultMsg');
    const lCat = document.getElementById('lunchCat');

    btn.disabled = true;
    btn.textContent = '🎰 轉動中...';
    msg.classList.remove('show');
    lCat.classList.remove('show');

    document.getElementById('lunchIdle').classList.add('hidden');
    document.getElementById('drinkIdle').classList.add('hidden');

    const lunch = selectLunch();
    const di    = Math.floor(Math.random() * DRINKS.length);

    spinSlot('lunchStrip', LUNCH_NAMES, lunch.i, 2000, () => {
        lCat.textContent = lunch.cat;
        lCat.classList.add('show');
    });

    spinSlot('drinkStrip', DRINKS, di, 2700, () => {
        msg.textContent = MSGS[Math.floor(Math.random() * MSGS.length)];
        msg.classList.add('show');
        burst();
        btn.textContent = '🔄 再轉一次';
        btn.disabled = false;
        busy = false;
    });
}

function burst() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight * 0.42;
    const clrs = ['#f5c842','#9b3de8','#ff6b9d','#4fc3f7','#a3ff6f','#ff9f43'];
    for (let i = 0; i < 30; i++) {
        const d = document.createElement('div');
        d.className = 'p';
        const sz = 4 + Math.random() * 9;
        const a  = Math.random() * Math.PI * 2;
        const r  = 70 + Math.random() * 140;
        d.style.cssText = `
            width:${sz}px;height:${sz}px;
            left:${cx}px;top:${cy}px;
            background:${clrs[Math.floor(Math.random()*clrs.length)]};
            --x:${Math.cos(a)*r}px;
            --y:${Math.sin(a)*r}px;
            --d:${.7+Math.random()*.5}s;
            --dl:${Math.random()*.2}s;
        `;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 1400);
    }
}
</script>
</body>
</html>
